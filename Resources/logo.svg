<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="clipGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5" />
      <stop offset="100%" stop-color="#7c3aed" />
    </linearGradient>
    <linearGradient id="outerGlow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa" />
      <stop offset="100%" stop-color="#c084fc" />
    </linearGradient>
  </defs>

  <!-- Clipboard Base -->
  <rect x="56" y="80" width="400" height="390" rx="60" fill="url(#clipGrad)" stroke="url(#outerGlow)" stroke-width="26" />

  <!-- Back Schedule Sheet (Pink) peeking out angled -->
  <path d="M 100 160 L 380 130 L 410 390 L 130 420 Z" fill="#ec4899" stroke="#831843" stroke-width="16" stroke-linejoin="round" />

  <!-- Front Schedule Sheet (Cyan/White) -->
  <rect x="110" y="170" width="290" height="250" rx="30" fill="#06b6d4" stroke="#164e63" stroke-width="16" />
  
  <!-- Class Time Slots (Chunky horizontal bars) -->
  <rect x="150" y="220" width="210" height="32" rx="10" fill="#ffffff" />
  <rect x="150" y="275" width="210" height="32" rx="10" fill="#ffffff" />
  <rect x="150" y="330" width="140" height="32" rx="10" fill="#ffffff" />

  <!-- Chunky Clipboard Clip at Top -->
  <rect x="180" y="36" width="152" height="74" rx="24" fill="#1e293b" stroke="url(#outerGlow)" stroke-width="14" />
  <circle cx="256" cy="73" r="14" fill="#f59e0b" />
</svg>
